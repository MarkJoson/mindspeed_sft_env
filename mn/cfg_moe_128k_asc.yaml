# Qwen3.6-35B-A3B MoE LONG-CONTEXT 128k ASCENDC on 16x Ascend910B3 (2 nodes)
# Ulysses CP=8 (intra-node) -> dp=2, per-card seq=16k. bs64 via grad_accum (see below). Feasibility: prof OFF.

parallel:
  fully_shard_parallel_size: auto  # auto -> 16
  fsdp_plan:
    apply_modules:                 # order matters for prefetch; keep as official MoE
      - model.visual
      - model.visual.blocks.{*}
      - model.language_model
      - model.language_model.embed_tokens
      - model.language_model.layers.{*}
      - model.language_model.layers.{*}.linear_attn
      - model.language_model.layers.{*}.mlp.experts
      - lm_head
    hook_modules:
      - model.language_model.layers.{*}
    param_dtype: bf16
    reduce_dtype: fp32
    cpu_offload: false
  ulysses_parallel_size: 8         # CP=8 intra-node -> seq split /8, dp=16/8=2 (2 seqs in parallel)
  expert_parallel_size: 1          # experts FSDP-sharded (official default); profile then tune
  ep_plan:
    apply_modules:
      - model.language_model.layers.{*}.mlp.experts

data:
  dataset_param:
    dataset_type: huggingface
    attr:
      images: images
      messages: messages
      role_tag: role
      content_tag: content
      user_tag: user
      assistant_tag: assistant
    preprocess_parameters:
      model_name_or_path: &HF_MODEL_LOAD_PATH /path/to/models/Qwen/Qwen3.6-35B-A3B
      use_fast_tokenizer: true
      split_special_tokens: false
      image_max_pixels: 262144
      image_min_pixels: 1024
      video_max_pixels: 16384
      video_min_pixels: 0
      video_fps: 2.0
      video_maxlen: 64
    basic_parameters:
      cutoff_len: 131072               # 128k; samples in bench_long_256k all >286k tok -> truncate to uniform 128k
      neat_packing: false              # uniform fixed-len -> single-segment cu_seqlens, stable GDN shape
      template: qwen3_vl_nothink
      enable_thinking: false
      train_on_prompt: false
      mask_history: false
      dataset_dir: /path/to/data
      dataset: &DATASET_PATH /path/to/data/bench_long_256k.json
      cache_dir: /tmp/ds_cache_moe
      overwrite_cache: false
      preprocessing_batch_size: 1000
      preprocessing_num_workers: 16
      max_samples: null
  dataloader_param:
    pin_memory: true
    shuffle: false
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 8
    collate_param:
      model_name: qwen3vl
      ignore_pad_token_for_loss: true
    enable_preload: false

model:
  model_id: qwen3_5_moe
  model_name_or_path: *HF_MODEL_LOAD_PATH
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze:
    - model.visual
  gdn_implementation: ascendc      # OPT: ascendc GDN (vendor restored) - fixes triton GDN 18% cube util; needs TQ=0 (run_moe.sh sets it)
  use_grouped_expert_matmul: true  # GMM fusion for the 256 experts
  skip_gdn_recompute: true         # OPT: offload GDN activations to CPU instead of recomputing (GDN=20% of compute-bound step)
  skip_flash_attn_recompute: true  # OPT: offload flash-attn activations to CPU instead of recomputing (full-attn=27%)

features:
  loss_cfg:
    loss_type: default
    router_aux_loss_coef: 0.0
  recompute: true
  recompute_plan:
      apply_modules:
        - model.visual.blocks.{*}
        - model.language_model.layers.{*}
  enable_chunk_loss: true
  chunkloss_plan:
    apply_module: lm_head
    chunk_size: 1024
  enable_activation_offload: false

training:
  micro_batch_size: 1
  gradient_accumulation_steps: 1
  seed: 42
  lr: 1.0e-5
  lr_decay_style: cosine
  lr_warmup_ratio: 0.1
  weight_decay: 0
  train_iters: 4
  clip_grad: 0.0
  init_model_with_meta_device: true
  optimizer: adamw
  adam_fused: true
  save_interval: 10000
  no_load_optim: true
  no_load_rng: true
  no_save_optim: true
  no_save_rng: true
  load: /path/to/models/Qwen/Qwen3.6-35B-A3B-dcp  # converted DCP (experts transposed); HF-direct can't load MoE experts
  load_format: auto                  # auto-detects dcp (no safetensors at top level)
  load_rank0_and_broadcast: false    # native FSDP sharded DCP load
  save: /path/to/output
  use_deter_comp: false
  plugin:
    - mindspeed_mm/fsdp/models/qwen3_5_moe
    - mindspeed_mm/fsdp/data/datasets/huggingface

tools:
  profile:
    enable: false
    profile_type: static
    ranks: [0]
    static_param:
      level: level1
      with_stack: true
      with_memory: false
      record_shapes: true
      with_cpu: true
      save_path: /tmp/prof_moe
      start_step: 9
      end_step: 11
      analyse_flag: true
      data_simplification: true
      aic_metrics_type: PipeUtilization
  memory_profile:
      enable: false
      start_step: 1
      end_step: 2
      save_path: ./memory_snapshot
      dump_ranks: [0]
      stacks: all
      max_entries: null
      mem_info: false
