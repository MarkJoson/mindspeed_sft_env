# 8-card SFT SMOKE TEST for the qwen36sft image.
# Minimal Qwen3.6 dense (8 layers: 6 linear_attention + 2 full_attention), RANDOM init
# (no weights loaded: init_model_with_meta_device + load:null + load_rank0_and_broadcast:false).
# Goal: confirm the image executes end-to-end on 8x910B (GDN ascendc + full attn + FSDP2).

parallel:
  fully_shard_parallel_size: auto   # -> 8
  fsdp_plan:
    apply_modules:
      - model.visual
      - model.visual.blocks.{*}
      - model.language_model
      - model.language_model.embed_tokens
      - model.language_model.layers.{*}
      - lm_head
    param_dtype: bf16
    reduce_dtype: fp32
    cpu_offload: false
  ulysses_parallel_size: 1

data:
  dataset_param:
    dataset_type: huggingface
    attr:
      images: images
      messages: messages
      role_tag: role
      content_tag: content
      user_tag: user
      assistant_tag: assistant
    preprocess_parameters:
      model_name_or_path: /workspace/qwen36-mini
      use_fast_tokenizer: true
      split_special_tokens: false
      image_max_pixels: 262144
      image_min_pixels: 1024
      video_max_pixels: 16384
      video_min_pixels: 0
      video_fps: 2.0
      video_maxlen: 64
    basic_parameters:
      cutoff_len: 1024
      neat_packing: true
      template: qwen3_vl_nothink
      enable_thinking: false
      train_on_prompt: false
      mask_history: false
      dataset_dir: /workspace/smoke/data
      dataset: /workspace/smoke/data/mini_sft.json
      cache_dir: /tmp/ds_cache
      overwrite_cache: true
      preprocessing_batch_size: 1000
      preprocessing_num_workers: 4
      max_samples: null
  dataloader_param:
    pin_memory: true
    shuffle: false
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 2
    collate_param:
      model_name: qwen3vl
      ignore_pad_token_for_loss: true
    enable_preload: false

model:
  model_id: qwen3_5
  model_name_or_path: /workspace/qwen36-mini
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze:
    - model.visual
  gdn_implementation: ascendc   # exercise the fla_npu AscendC GDN ops

features:
  loss_cfg:
    loss_type: default
    router_aux_loss_coef: 0.0
  recompute: true
  recompute_plan:
      apply_modules:
        - model.visual.blocks.{*}
        - model.language_model.layers.{*}
  enable_chunk_loss: true
  chunkloss_plan:
    apply_module: lm_head
    chunk_size: 1024
  enable_activation_offload: false

training:
  micro_batch_size: 1
  gradient_accumulation_steps: 1
  seed: 42
  lr: 1.0e-5
  lr_decay_style: cosine
  lr_warmup_ratio: 0.1
  weight_decay: 0
  train_iters: 5
  clip_grad: 0.0
  init_model_with_meta_device: true
  optimizer: adamw
  adam_fused: true
  save_interval: 100000
  no_load_optim: true
  no_load_rng: true
  no_save_optim: true
  no_save_rng: true
  # load OMITTED -> defaults to None (unvalidated) -> init_model_weights random init.
  # (load_rank0_and_broadcast defaults to False, required for the random-init branch.)
  save: /tmp/smoke_out
  use_deter_comp: false
  plugin:
    - mindspeed_mm/fsdp/models/qwen3_5
    - mindspeed_mm/fsdp/data/datasets/huggingface

tools:
  profile:
    enable: false
    profile_type: static
    ranks: [0]
    static_param:
      level: level1
      with_stack: false
      with_memory: false
      record_shapes: false
      with_cpu: true
      save_path: ./profiling
      start_step: 10
      end_step: 11
      data_simplification: false
      aic_metrics_type: PipeUtilization
  memory_profile:
    enable: false
    start_step: 1
    end_step: 2
    save_path: ./memory_snapshot
    dump_ranks: [0]
    stacks: all
    max_entries: null
    mem_info: false
